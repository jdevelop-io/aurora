name: CI

# Lint the shell scripts of the Claude Code plugin. Triggered on main and on every
# pull request that touches the hooks (or this workflow), to keep the scripts
# healthy as the plugin evolves.
on:
  push:
    branches: [main]
    paths:
      - "claude-code-plugin/hooks/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "claude-code-plugin/hooks/**"
      - ".github/workflows/ci.yml"

# No write permission: the lint only needs to read the code.
permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck the hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The lint does not push anything: no need to keep the token in .git.
          persist-credentials: false

      # shellcheck is preinstalled on ubuntu-latest runners.
      - name: Lint the hook scripts
        run: shellcheck claude-code-plugin/hooks/*.sh
