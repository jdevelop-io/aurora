name: Release

# Déclenché quand tu pushes un tag de version, ex. : v0.2.0
on:
  push:
    tags:
      - "v*"

# Par défaut, aucun job n'a d'accès en écriture : le droit est élevé au cas par
# cas (ici sur le job build, qui publie la release).
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Droit d'écriture limité à ce job (création de release + upload des assets).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v7
        with:
          # Ne pas laisser le token GITHUB_TOKEN dans .git/config pendant le
          # build : les build.rs des dépendances s'exécutent sur le runner et ne
          # doivent pas pouvoir lire un credential d'écriture.
          persist-credentials: false

      - name: Installer la toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Installer cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Empaqueter l'archive
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          bin=aurora
          ext=""
          if [[ "$TARGET" == *windows* ]]; then ext=".exe"; fi
          src="target/${TARGET}/release/${bin}${ext}"
          name="aurora-${REF_NAME}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "$src" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          cd dist
          if [[ "$TARGET" == *windows* ]]; then
            archive="${name}.zip"
            7z a "$archive" "${name}" >/dev/null
          else
            archive="${name}.tar.gz"
            tar -czf "$archive" "${name}"
          fi
          # Empreinte SHA-256 publiée à côté de l'archive, vérifiée par les
          # installeurs avant exécution du binaire.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          echo "ASSET=dist/${archive}" >> "$GITHUB_ENV"

      - name: Publier sur la release
        uses: softprops/action-gh-release@v3
        with:
          # La release du tag est créée si elle n'existe pas ; chaque job y ajoute son archive.
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
