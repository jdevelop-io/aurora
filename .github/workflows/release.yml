name: Release

# Triggered when you push a version tag, e.g.: v0.2.0
on:
  push:
    tags:
      - "v*"

# By default, no job has write access: the permission is elevated on a
# case-by-case basis (here on the build job, which publishes the release).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # A tag can be pushed onto any commit, including one CI never saw. Shipping
  # binaries that were never tested is precisely what this gate prevents: no
  # archive is built, and no release published, until the suite passes on the
  # tagged commit itself.
  test:
    name: Test the tagged commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    # Write permission limited to this job (release creation + asset upload).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v7
        with:
          # Do not leave the GITHUB_TOKEN token in .git/config during the
          # build: the dependencies' build.rs scripts run on the runner and must
          # not be able to read a write credential.
          persist-credentials: false

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Package the archive
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          bin=aurora
          ext=""
          if [[ "$TARGET" == *windows* ]]; then ext=".exe"; fi
          src="target/${TARGET}/release/${bin}${ext}"
          name="aurora-${REF_NAME}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "$src" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          cd dist
          if [[ "$TARGET" == *windows* ]]; then
            archive="${name}.zip"
            7z a "$archive" "${name}" >/dev/null
          else
            archive="${name}.tar.gz"
            tar -czf "$archive" "${name}"
          fi
          # SHA-256 checksum published alongside the archive, verified by
          # installers before running the binary.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          echo "ASSET=dist/${archive}" >> "$GITHUB_ENV"

      - name: Publish to the release
        uses: softprops/action-gh-release@v3
        with:
          # The tag's release is created if it does not exist; each job adds its archive to it.
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
