name: Release

# Triggered when you push a version tag, e.g.: v0.2.0
on:
  push:
    tags:
      - "v*"

# By default, no job has write access: the permission is elevated on a
# case-by-case basis (here on the build job, which publishes the release).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # A tag can be pushed onto any commit, including one CI never saw. Shipping
  # binaries that were never tested is precisely what this gate prevents: no
  # archive is built, and no release published, until the suite passes on the
  # tagged commit itself.
  test:
    name: Test the tagged commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    # Write permission limited to this job (release creation + asset upload).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v7
        with:
          # Do not leave the GITHUB_TOKEN token in .git/config during the
          # build: the dependencies' build.rs scripts run on the runner and must
          # not be able to read a write credential.
          persist-credentials: false

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin aurora

      - name: Package the archive
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          bin=aurora
          ext=""
          if [[ "$TARGET" == *windows* ]]; then ext=".exe"; fi
          src="target/${TARGET}/release/${bin}${ext}"
          name="aurora-${REF_NAME}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "$src" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          cd dist
          if [[ "$TARGET" == *windows* ]]; then
            archive="${name}.zip"
            7z a "$archive" "${name}" >/dev/null
          else
            archive="${name}.tar.gz"
            tar -czf "$archive" "${name}"
          fi
          # SHA-256 checksum published alongside the archive, verified by
          # installers before running the binary.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          echo "ASSET=dist/${archive}" >> "$GITHUB_ENV"

      - name: Publish to the release
        uses: softprops/action-gh-release@v3
        with:
          # The tag's release is created if it does not exist; each job adds its archive to it.
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Completions and the man page are plain text and identical on every platform,
  # and a cross-compiled binary cannot be run on the runner that built it. So the
  # binary generates them once, natively, in its own archive.
  assets:
    name: Completions and man page
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --bin aurora

      - name: Generate
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          name="aurora-${REF_NAME}-completions"
          mkdir -p "dist/${name}/completions"
          for shell in bash zsh fish powershell elvish; do
            ./target/release/aurora --completions "$shell" \
              > "dist/${name}/completions/aurora.${shell}"
          done
          ./target/release/aurora --man > "dist/${name}/aurora.1"
          cd dist
          tar -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "ASSET=dist/${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Publish to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true

  # The tap must be a repository named `homebrew-*` (Homebrew resolves
  # `jdevelop-io/tap` to `jdevelop-io/homebrew-tap`), so the formula cannot live
  # in this repository. It is regenerated here instead of by hand, because a
  # formula that lags the release is worse than no formula at all.
  #
  # Needs a HOMEBREW_TAP_TOKEN secret: a fine-grained PAT with `contents: write`
  # on jdevelop-io/homebrew-tap. The repository's own GITHUB_TOKEN cannot push to
  # another repository.
  homebrew:
    name: Update the Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tap
        uses: actions/checkout@v7
        with:
          repository: jdevelop-io/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Regenerate the formula
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          base="https://github.com/jdevelop-io/aurora/releases/download/${REF_NAME}"

          # Read the checksums the build job published, rather than recomputing
          # them: the formula must pin exactly the bytes that were released.
          sha() {
            curl -fsSL --retry 5 --retry-delay 3 \
              "${base}/aurora-${REF_NAME}-$1.tar.gz.sha256" | cut -d' ' -f1
          }
          macos_arm=$(sha aarch64-apple-darwin)
          macos_intel=$(sha x86_64-apple-darwin)
          linux_arm=$(sha aarch64-unknown-linux-gnu)
          linux_intel=$(sha x86_64-unknown-linux-gnu)

          cat > Formula/aurora-runner.rb <<FORMULA
          class AuroraRunner < Formula
            desc "Parallel task runner and build tool driven by a Beamfile"
            homepage "https://github.com/jdevelop-io/aurora"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/aurora-${REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${macos_arm}"
              end

              on_intel do
                url "${base}/aurora-${REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${macos_intel}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/aurora-${REF_NAME}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_arm}"
              end

              on_intel do
                url "${base}/aurora-${REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_intel}"
              end
            end

            # homebrew/core already has an \`aurora\` (a Beanstalkd console), and it ships an
            # \`aurora\` binary too. Hence the formula name: \`brew install aurora\` must not
            # silently hand the user the other project.
            conflicts_with "aurora", because: "both install an \`aurora\` binary"

            def install
              bin.install "aurora"

              # The binary emits these itself, so they can never drift from the CLI
              # that actually shipped.
              generate_completions_from_executable(bin/"aurora", "--completions")
              (man1/"aurora.1").write Utils.safe_popen_read(bin/"aurora", "--man")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/aurora --version")

              (testpath/"Beamfile").write <<~BEAMFILE
                aurora {
                  version = "1"
                  default = "greet"
                }

                beam "greet" {
                  description = "prints a greeting"
                  run { commands = ["echo hello from aurora"] }
                }
              BEAMFILE

              assert_match "hello from aurora",
                shell_output("#{bin}/aurora greet --no-tui")
            end
          end
          FORMULA

      - name: Commit and push
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Formula already up to date, nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aurora-runner.rb
          git commit -m ":bookmark: chore(aurora): update the formula to ${REF_NAME}"
          git push
